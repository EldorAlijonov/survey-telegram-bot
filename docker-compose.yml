services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: survey_bot
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    command: sh -c "alembic upgrade head && python main.py"

volumes:
  postgres_data:
